[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Keep admin out of search engines just in case someone forgets the
# noindex meta tag matters less than this for crawlers that ignore it.
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
